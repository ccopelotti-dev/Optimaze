                                                                                placeholder="Fecha"
                                                                                style={{ flex: 1, minWidth: '120px' }}
                                                                            />
                                                                            <InputNumber
                                                                                value={newEdgeScore}
                                                                                onChange={setNewEdgeScore}
                                                                                placeholder="Score"
                                                                                min={0} max={100}
                                                                                style={{ width: '100px' }}
                                                                            />
                                                                            <Button type="primary" onClick={handleAddEdgeRecord} style={{ background: '#00b96b', borderColor: '#00b96b' }}>
                                                                                Añadir
                                                                            </Button>
                                                                        </div>

                                                                        {edgeHistory && edgeHistory.length > 0 ? (
                                                                            <>
                                                                                <div style={{ width: '100%', height: 200, position: 'relative', marginTop: 16 }}>
                                                                                    <ResponsiveContainer width="100%" height="100%">
                                                                                        <LineChart data={[...edgeHistory]} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                                                                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e8ecef" />
                                                                                            <XAxis dataKey="dateString" tick={{ fill: '#6c757d', fontSize: 12 }} axisLine={false} tickLine={false} tickFormatter={(val) => dayjs(val).format('DD/MM/YY')} />
                                                                                            <YAxis domain={[0, 100]} tick={{ fill: '#6c757d', fontSize: 12 }} axisLine={false} tickLine={false} />
                                                                                            <RechartsTooltip
                                                                                                contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}
                                                                                                labelFormatter={(val) => dayjs(val).format('DD/MM/YYYY')}
                                                                                            />
                                                                                            <Line key={`line-${edgeHistory.length}`} type="monotone" dataKey="score" stroke="#00b96b" strokeWidth={3} dot={{ r: 4, strokeWidth: 2, fill: '#fff', stroke: '#00b96b' }} activeDot={{ r: 6 }} isAnimationActive={false} />
                                                                                        </LineChart>
                                                                                    </ResponsiveContainer>
                                                                                </div>
                                                                                <div style={{ display: 'none' }}>
                                                                                    <Table
                                                                                        dataSource={edgeHistory}
                                                                                        rowKey="id"
                                                                                        size="small"
                                                                                        pagination={{ pageSize: 3, position: ['bottomCenter'] }}
                                                                                        columns={[
                                                                                            { title: 'Fecha', dataIndex: 'dateString', key: 'dateString', render: (val) => dayjs(val).format('DD/MM/YYYY') },
                                                                                            { title: 'Score', dataIndex: 'score', key: 'score', render: (val) => <strong style={{ color: '#1a1d20' }}>{val}</strong> },
                                                                                            { title: '', key: 'action', align: 'right', render: (_, record) => <Button type="text" danger icon={<DeleteOutlined />} size="small" onClick={() => handleDeleteEdgeRecord(record.id)} /> }
                                                                                        ]}
                                                                                    />
                                                                                </div>
                                                                            </>
                                                                        ) : (
                                                                            <div style={{ width: '100%', height: 220, display: 'flex', justifyContent: 'center', alignItems: 'center', background: '#f5f5f5', borderRadius: '8px' }}>
                                                                                <Text type="secondary">Sin datos históricos.</Text>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                </Col>
                                                            </Row>
                                                        </Card>
                                                    </Col>
                                                    <Col xs={24} md={24} style={{ marginTop: '24px' }}>
                                                        <Card className="premium-card" title="Análisis Dimensional" style={{ height: 'max-content' }} bodyStyle={{ padding: '24px' }}>
                                                            <Row gutter={24} align="top">
                                                                <Col span={24}>
                                                                    <Space direction="vertical" style={{ width: '100%' }}>
                                                                        <div>
                                                                            <Text strong>Skill (Habilidad)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.skill} onChange={(v) => handleAxiParamChange('skill', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.skill} onChange={(v) => handleAxiParamChange('skill', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                        <div>
                                                                            <Text strong>Risk (Riesgo)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.risk} onChange={(v) => handleAxiParamChange('risk', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.risk} onChange={(v) => handleAxiParamChange('risk', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                        <div>
                                                                            <Text strong>Consistency (Consistencia)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.consistency} onChange={(v) => handleAxiParamChange('consistency', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.consistency} onChange={(v) => handleAxiParamChange('consistency', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                        <div>
                                                                            <Text strong>Experience (Experiencia)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.experience} onChange={(v) => handleAxiParamChange('experience', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.experience} onChange={(v) => handleAxiParamChange('experience', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                    </Space>
                                                                </Col>
                                                            </Row>
                                                        </Card>
                                                    </Col>
                                                    <Col xs={24} md={16} lg={12} xl={8} style={{ marginTop: '24px' }}>
                                                        <Card className="premium-card" title="Rendimiento" style={{ width: '100%' }} bodyStyle={{ padding: '24px' }}>
                                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                                                                <Text type="secondary">Rentabilidad mensual comparativa.</Text>
                                                                <Button
                                                                    type="dashed"
                                                                    size="small"
                                                                    icon={<PlusOutlined />}
                                                                    onClick={() => {
                                                                        console.log('Abriendo modal mes...');
                                                                        setIsMonthlyModalVisible(true);
                                                                    }}
                                                                    style={{ borderColor: '#00b96b', color: '#00b96b', zIndex: 10, cursor: 'pointer' }}
                                                                >
                                                                    Añadir Mes
                                                                </Button>
                                                            </div>

                                                            <div style={{ width: '100%', height: 260, marginBottom: 24 }}>
                                                                <ResponsiveContainer width="100%" height="100%">
                                                                    <BarChart data={monthlyProfitability} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e8ecef" />
                                                                        <XAxis dataKey="month" tick={{ fill: '#6c757d', fontSize: 12 }} axisLine={false} tickLine={false} />
                                                                        <YAxis tick={{ fill: '#6c757d', fontSize: 12 }} axisLine={false} tickLine={false} tickFormatter={(val) => `${val}%`} />
                                                                        <RechartsTooltip
                                                                            contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}
                                                                            formatter={(value) => [`${value}%`, 'Rendimiento']}
                                                                        />
                                                                        <Bar dataKey="percentage" radius={[4, 4, 0, 0]}>
                                                                            {monthlyProfitability.map((entry, index) => (
                                                                                <Cell key={`cell-${index}`} fill={entry.percentage > 0 ? '#00b96b' : (entry.percentage < 0 ? '#ff4d4f' : '#ced4da')} />
                                                                            ))}
                                                                        </Bar>
                                                                    </BarChart>
                                                                </ResponsiveContainer>
                                                            </div>

                                                            <Table
                                                                dataSource={monthlyProfitability}
                                                                rowKey="id"
                                                                size="small"
                                                                columns={[
                                                                    { title: 'Mes', dataIndex: 'month', key: 'month' },
                                                                    {
                                                                        title: 'Rendimiento (%)',
                                                                        dataIndex: 'percentage',
                                                                        key: 'percentage',
                                                                        render: val => <span style={{ color: val > 0 ? '#00b96b' : (val < 0 ? '#ff4d4f' : '#1a1d20'), fontWeight: 'bold' }}>{val > 0 ? '+' : ''}{val}%</span>
                                                                    },
                                                                    {
                                                                        title: 'Monto ($)',
                                                                        dataIndex: 'amount',
                                                                        key: 'amount',
                                                                        render: val => <span style={{ color: val > 0 ? '#00b96b' : (val < 0 ? '#ff4d4f' : '#1a1d20') }}>${val.toLocaleString()}</span>
                                                                    }
                                                                ]}
                                                                pagination={false}
                                                            />
                                                        </Card>
                                                    </Col>


                                                </Row>
                                            </>
                                        )}

                                        {activeMenu === 'axi_real' && (
                                            <>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <div>
                                                        <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Axi Real Dashboard</Title>
                                                        <Text type="secondary">Monitoreo de capital y performance histórica.</Text>
                                                    </div>
                                                    <RangePicker size="large" />
                                                </div>

                                                <Row gutter={24} style={{ marginBottom: 24 }}>
                                                    <Col xs={24} sm={12}>
                                                        <Card className="premium-card" style={{ borderLeft: '4px solid #1677ff' }}>
                                                            <Statistic
                                                                title="Balance Actual"
                                                                value={axiRealData.balance}
                                                                precision={2}
                                                                prefix="$"
                                                                valueStyle={{ color: '#1a1d20', fontWeight: 600 }}
                                                            />
                                                        </Card>
                                                    </Col>
                                                    <Col xs={24} sm={12}>
                                                        <Card className="premium-card" style={{ borderLeft: '4px solid #00b96b' }}>
                                                            <Statistic
                                                                title="Equidad (Equity)"
                                                                value={axiRealData.equity}
                                                                precision={2}
                                                                prefix="$"
                                                                valueStyle={{ color: '#00b96b', fontWeight: 600 }}
                                                            />
                                                        </Card>
                                                    </Col>
                                                </Row>

                                                <Card className="premium-card" title="Historial de Transacciones" bodyStyle={{ padding: 0 }}>
                                                    <Table
                                                        dataSource={axiRealData.history}
                                                        columns={[
                                                            { title: 'Fecha', dataIndex: 'date', key: 'date' },
                                                            { title: 'Balance', dataIndex: 'balance', key: 'balance', render: val => `$${val.toFixed(2)}` },
                                                            { title: 'Equidad', dataIndex: 'equity', key: 'equity', render: val => `$${val.toFixed(2)}` },
                                                            { title: 'PnL', dataIndex: 'pnl', key: 'pnl', render: val => <Tag color={val >= 0 ? 'success' : 'error'}>{val >= 0 ? '+' : ''}{val.toFixed(2)}</Tag> }
                                                        ]}
                                                        pagination={false}
                                                    />
                                                </Card>
                                            </>
                                        )}

                                        {activeMenu === 'prop_trading' && (
                                            <>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Gestión de Cuentas Prop Trading</Title>
                                                    <Button type="primary" icon={<PlusOutlined />} style={{ background: '#00b96b', borderColor: '#00b96b' }} onClick={() => setIsPropModalVisible(true)}>
                                                        Nueva Cuenta
                                                    </Button>
                                                </div>

                                                {['Fase 1', 'Fase 2', 'Real'].map(fase => {
                                                    const filteredData = propTradingData.filter(d => d.type === fase);
                                                    if (filteredData.length === 0) return null;

                                                    return (
                                                        <div key={fase} style={{ marginBottom: 24 }}>
                                                            <Title level={5} style={{ color: '#1a1d20', marginBottom: 16 }}>
                                                                {fase === 'Real' ? 'Real' : `Evaluación ${fase}`}
                                                            </Title>
                                                            <Card className="premium-card" bodyStyle={{ padding: 0 }}>
                                                                <Table
                                                                    dataSource={filteredData}
                                                                    rowKey="id"
                                                                    columns={[
                                                                        { title: 'Compañía', dataIndex: 'firm', key: 'firm' },
                                                                        { title: 'Nombre de Cuenta', dataIndex: 'name', key: 'name', render: t => <Text strong>{t}</Text> },
                                                                        { title: 'Balance', dataIndex: 'balance', key: 'balance', render: val => `$${val.toLocaleString()}` },
                                                                        {
                                                                            title: 'PNL Diario',
                                                                            dataIndex: 'pnlDiario',
                                                                            key: 'pnlDiario',
                                                                            render: val => <Text style={{ color: (val || 0) >= 0 ? '#00b96b' : '#ff4d4f' }}>{(val || 0) >= 0 ? '+' : ''}{(val || 0).toLocaleString()}</Text>
                                                                        },
                                                                        {
                                                                            title: 'Balance New',
                                                                            key: 'balanceNew',
                                                                            render: (_, record) => <Text strong style={{ color: '#00b96b' }}>${(record.balance + (record.pnlDiario || 0)).toLocaleString()}</Text>
                                                                        },
                                                                        {
                                                                            title: 'Progreso',
                                                                            key: 'progress',
                                                                            width: '25%',
                                                                            render: (_, record) => {
                                                                                const balanceNew = record.balance + (record.pnlDiario || 0);
                                                                                const percent = getProgressPercent(balanceNew, record.goal);
                                                                                return <Progress percent={percent} strokeColor={getProgressColor(percent)} trailColor="#e8ecef" />;
                                                                            }
                                                                        },
                                                                        {
                                                                            title: 'Acciones',
                                                                            key: 'actions',
                                                                            render: (_, record) => (
                                                                                <Space>
                                                                                    <Button type="text" icon={<EditOutlined style={{ color: '#6c757d' }} />} />
                                                                                    <Button type="text" danger icon={<DeleteOutlined />} onClick={() => handleDeleteProp(record.id)} />
                                                                                </Space>
                                                                            )
                                                                        }
                                                                    ]}
                                                                    pagination={false}
                                                                />
                                                            </Card>
                                                        </div>
                                                    );
                                                })}
                                            </>
                                        )}

                                        {activeMenu === 'accounting' && (
                                            <Card className="premium-card" bodyStyle={{ padding: 0 }}>
                                                <Table
                                                    dataSource={transactions}
                                                    rowKey="id"
                                                    columns={[
                                                        { title: 'Fecha', dataIndex: 'date', key: 'date' },
                                                        {
                                                            title: 'Tipo',
                                                            dataIndex: 'type',
                                                            key: 'type',
                                                            render: text => <Tag color={text === 'INCOME' ? 'green' : 'red'}>{text === 'INCOME' ? 'Cobro' : 'Gasto'}</Tag>
                                                        },
                                                        { title: 'Categoría', dataIndex: 'category', key: 'category' },
                                                        { title: 'Descripción', dataIndex: 'description', key: 'description' },
                                                        {
                                                            title: 'Monto Original',
                                                            key: 'amountOriginal',
                                                            render: (_, record) => `${record.currency === 'USD' ? '$' : 'ARS '}${record.amount.toLocaleString()}`
                                                        }
                                                    ]}
                                                    pagination={{ pageSize: 10 }}
                                                />
                                            </Card>
                                        )}

                                        {activeMenu === 'users_settings' && (
                                            <>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Gestión de Usuarios</Title>
                                                    <Button type="primary" icon={<PlusOutlined />} style={{ background: '#00b96b', borderColor: '#00b96b' }} onClick={() => setIsUserModalVisible(true)} disabled={currentUser?.role !== 'admin'}>
                                                        Nuevo Usuario
                                                    </Button>
                                                </div>
                                                {currentUser?.role !== 'admin' && (
                                                    <div style={{ marginBottom: 16 }}>
                                                        <Text type="danger">Acceso denegado: Se requieren permisos de administrador para gestionar usuarios.</Text>
                                                    </div>
                                                )}
                                                <Card className="premium-card" bodyStyle={{ padding: 0 }}>
                                                    <Table
                                                        dataSource={users}
                                                        rowKey="id"
                                                        columns={[
                                                            { title: 'ID', dataIndex: 'id', key: 'id' },
                                                            { title: 'Usuario', dataIndex: 'username', key: 'username', render: t => <Text strong>{t}</Text> },
                                                            { title: 'Rol', dataIndex: 'role', key: 'role', render: t => <Tag color={t === 'admin' ? 'purple' : 'blue'}>{t.toUpperCase()}</Tag> },
                                                            {
                                                                title: 'Acciones',
                                                                key: 'actions',
                                                                render: (_, record) => (
                                                                    <Button type="text" danger icon={<DeleteOutlined />} onClick={() => handleDeleteUser(record.id)} disabled={record.role === 'admin' || currentUser?.role !== 'admin'} />
                                                                )
                                                            }
                                                        ]}
                                                        pagination={false}
                                                    />
                                                </Card>
                                            </>
                                        )}

                                    </Content>
                                </Layout>
                            </Layout>

                            {/* Modals for Accounting */}
                            <Modal title="Registrar Gasto" open={isExpenseModalVisible} onCancel={() => setIsExpenseModalVisible(false)} footer={null}>
                                <Form form={expenseForm} layout="vertical" onFinish={handleExpenseSubmit}>
                                    <Form.Item name="date" label="Fecha" rules={[{ required: true }]} initialValue={dayjs().format('YYYY-MM-DD')}>
                                        <Input type="date" />
                                    </Form.Item>
                                    <Form.Item name="category" label="Categoría" rules={[{ required: true }]}>
                                        <Select>
                                            <Select.Option value="Capital de Trabajo">Capital de Trabajo (Software, Cuentas, Evaluaciones)</Select.Option>
                                            <Select.Option value="Servicios">Servicios (Internet, Suscripciones recurrentes)</Select.Option>
                                            <Select.Option value="Activos Amortizables">Activos Amortizables (Hardware, PCs, Monitores)</Select.Option>
                                        </Select>
                                    </Form.Item>
                                    {expenseCategory === 'Activos Amortizables' && (
                                        <Form.Item name="usefulLifeMonths" label="Vida Útil (Meses) para Depreciación" rules={[{ required: true }]}>
                                            <InputNumber min={1} style={{ width: '100%' }} />
                                        </Form.Item>
                                    )}
                                    <Form.Item name="description" label="Descripción">
                                        <Input />
                                    </Form.Item>
                                    <Row gutter={16}>
                                        <Col span={8}>
                                            <Form.Item name="currency" label="Moneda" rules={[{ required: true }]} initialValue="USD">
                                                <Select>
                                                    <Select.Option value="USD">USD</Select.Option>
                                                    <Select.Option value="ARS">ARS</Select.Option>
                                                </Select>
                                            </Form.Item>
                                        </Col>
                                        <Col span={16}>
                                            <Form.Item name="amount" label="Monto" rules={[{ required: true }]}>
                                                <InputNumber min={0} step={0.01} style={{ width: '100%' }} />
                                            </Form.Item>
                                        </Col>
                                    </Row>
                                    {expenseCurrency === 'ARS' && (
                                        <Form.Item name="exchangeRate" label="Tipo de Cambio (ARS por 1 USD)" rules={[{ required: true }]}>
                                            <InputNumber min={1} style={{ width: '100%' }} />
                                        </Form.Item>
                                    )}
                                    <Button type="primary" htmlType="submit" block danger>Registrar Gasto</Button>
                                </Form>
                            </Modal>

                            <Modal title="Registrar Cobro" open={isIncomeModalVisible} onCancel={() => setIsIncomeModalVisible(false)} footer={null}>
                                <Form form={incomeForm} layout="vertical" onFinish={handleIncomeSubmit}>
                                    <Form.Item name="date" label="Fecha" rules={[{ required: true }]} initialValue={dayjs().format('YYYY-MM-DD')}>
                                        <Input type="date" />
                                    </Form.Item>
                                    <Form.Item name="category" label="Categoría" rules={[{ required: true }]}>
                                        <Select>
                                            <Select.Option value="Retiro Axi">Retiro Axi Select</Select.Option>
                                            <Select.Option value="Retiro Fondeo">Retiro de Cuenta Fondeada</Select.Option>
                                            <Select.Option value="Devolución">Devolución / Reembolso</Select.Option>
                                            <Select.Option value="Otro">Otro Ingreso</Select.Option>
                                        </Select>
                                    </Form.Item>
                                    <Form.Item name="description" label="Descripción">
                                        <Input />
                                    </Form.Item>
                                    <Form.Item name="currency" label="Moneda" initialValue="USD" hidden><Input /></Form.Item>
                                    <Form.Item name="amount" label="Monto Recibido (USD netos)" rules={[{ required: true }]}>
                                        <InputNumber min={0} step={0.01} style={{ width: '100%' }} prefix="$" />
                                    </Form.Item>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Registrar Cobro</Button>
                                </Form>
                            </Modal>

                            {/* Modal for User Management */}
                            <Modal title="Crear Nuevo Usuario" open={isUserModalVisible} onCancel={() => setIsUserModalVisible(false)} footer={null}>
                                <Form form={userForm} layout="vertical" onFinish={handleUserSubmit}>
                                    <Form.Item name="username" label="Nombre de Usuario" rules={[{ required: true }]}>
                                        <Input prefix={<UserOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} />
                                    </Form.Item>
                                    <Form.Item name="password" label="Contraseña" rules={[{ required: true }]}>
                                        <Input.Password prefix={<LockOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} />
                                    </Form.Item>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Guardar Usuario</Button>
                                </Form>
                            </Modal>

                            {/* Modal for Montly Profitability */}
                            <Modal title="Añadir Mes de Rendimiento" open={isMonthlyModalVisible} onCancel={() => setIsMonthlyModalVisible(false)} footer={null}>
                                <Form form={monthlyForm} layout="vertical" onFinish={handleAddMonthlyRecord}>
                                    <Form.Item name="month" label="Mes y Año (Ej: Marzo 2026)" rules={[{ required: true }]}>
                                        <Input placeholder="Ej. Marzo 2026" />
                                    </Form.Item>
                                    <Row gutter={16}>
                                        <Col span={12}>
                                            <Form.Item name="percentage" label="Rentabilidad (%)" rules={[{ required: true }]}>
                                                <InputNumber style={{ width: '100%' }} step={0.1} placeholder="Ej. 2.5" />
                                            </Form.Item>
                                        </Col>
                                        <Col span={12}>
                                            <Form.Item name="amount" label="Monto (USD)" rules={[{ required: true }]}>
                                                <InputNumber min={0} style={{ width: '100%' }} prefix="$" placeholder="Ej. 1250" />
                                            </Form.Item>
                                        </Col>
                                    </Row>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Guardar Mes</Button>
                                </Form>
                            </Modal>

                            {/* Modal for Prop Trading */}
                            <Modal title="Nueva Cuenta Prop Trading" open={isPropModalVisible} onCancel={() => setIsPropModalVisible(false)} footer={null}>
                                <Form form={propForm} layout="vertical" onFinish={handlePropSubmit}>
                                    <Form.Item name="firm" label="Compañía" rules={[{ required: true }]}>
                                        <Input placeholder="Ej. Tradeify, Topstep..." />
                                    </Form.Item>
                                    <Form.Item name="name" label="Nombre de Cuenta" rules={[{ required: true }]}>
                                        <Input placeholder="Ej. PA #1" />
                                    </Form.Item>
                                    <Form.Item name="type" label="Tipo de Cuenta" rules={[{ required: true }]} initialValue="Fase 1">
                                        <Select>
                                            <Select.Option value="Fase 1">Fase 1</Select.Option>
                                            <Select.Option value="Fase 2">Fase 2</Select.Option>
                                            <Select.Option value="Real">Real</Select.Option>
                                        </Select>
                                    </Form.Item>
                                    <Row gutter={16}>
                                        <Col span={8}>
                                            <Form.Item name="balance" label="Balance Inicial" rules={[{ required: true }]}>
                                                <InputNumber min={0} style={{ width: '100%' }} prefix="$" />
                                            </Form.Item>
                                        </Col>
                                        <Col span={8}>
                                            <Form.Item name="pnlDiario" label="PNL Diario" initialValue={0}>
                                                <InputNumber style={{ width: '100%' }} prefix="$" />
                                            </Form.Item>
                                        </Col>
                                        <Col span={8}>
                                            <Form.Item name="goal" label="Meta / Retiro" rules={[{ required: true }]}>
                                                <InputNumber min={0} style={{ width: '100%' }} prefix="$" />
                                            </Form.Item>
                                        </Col>
                                    </Row>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Guardar Cuenta</Button>
                                </Form>
                            </Modal>
                        </>
                    </ConfigProvider >
                );
            };

            const rootNode = document.getElementById('root');
            if (window.ReactDOM && window.ReactDOM.createRoot) {
                const root = window.ReactDOM.createRoot(rootNode);
                root.render(<App />);
            } else if (window.ReactDOM) {
                window.ReactDOM.render(<App />, rootNode);
            } else {
                console.error("ReactDOM not found.");
                rootNode.innerHTML = "<h1>Error: ReactDOM not found</h1>";
            }
        } catch (err) {
            console.error(err);
            document.getElementById('root').innerHTML = "<h1>Error en el renderizado</h1><pre>" + err.message + "</pre>";
        }
    </script>
</body>

</html>
