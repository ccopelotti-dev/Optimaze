<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimaze Trading Group</title>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Ant Design CSS and JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/reset.min.css"
        integrity="sha512-H/iMbm5C4a1B2UaA+2k+2E8Z4M9w2K6V7d+B7b7Y3wW7V2C8m3Y8+D7c8m3Y3B7V2C8m3Y8+D7c8m3Y3B7Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Ant Design Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/antd.min.js"></script>

    <!-- Ant Design Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ant-design-icons/5.2.6/index.umd.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            /* Light mode background */
            color: #1a1d20;
            /* Light mode text */
        }

        .premium-card {
            background-color: #ffffff;
            border: 1px solid #e8ecef;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        .premium-card .ant-card-head {
            border-bottom: 1px solid #e8ecef;
            color: #1a1d20;
        }

        .premium-card .ant-card-body {
            color: #495057;
        }

        .premium-card .ant-statistic-title {
            color: #6c757d;
        }

        .premium-card .ant-statistic-content {
            color: #1a1d20;
        }

        /* Light Sidebar Override */
        .ant-layout-sider {
            border-right: 1px solid #e8ecef;
        }

        .logo {
            height: 32px;
            margin: 16px;
            color: #00b96b;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #F8F9FA;
        }

        ::-webkit-scrollbar-thumb {
            background: #dee2e6;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ced4da;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        try {
            const { Layout, Menu, Typography, Card, Row, Col, Table, Tag, Statistic, ConfigProvider, theme, Progress, Button, Modal, Form, Input, InputNumber, Space, message, Select, DatePicker, Slider, Divider } = antd;
            const { Header, Content, Sider } = Layout;
            const { Title, Text } = Typography;
            const { RangePicker } = DatePicker;
            const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, BarChart, Bar, Cell, Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis } = Recharts;

            // Fallback for icons if AntDesignIcons is used instead of icons
            const IconsObj = typeof icons !== 'undefined' ? icons : (window.icons || window.AntDesignIcons || {});
            const { DashboardOutlined, LineChartOutlined, WalletOutlined, BankOutlined, RiseOutlined, EditOutlined, UploadOutlined, PlusOutlined, UserOutlined, DeleteOutlined, FallOutlined, DollarOutlined, BarChartOutlined, CheckCircleOutlined, LockOutlined, LogoutOutlined } = IconsObj;

            const LIGHT_MODE_VARS = {
                colorPrimary: '#00b96b',
                colorBgBase: '#F8F9FA',
                colorBgContainer: '#ffffff',
                colorBorder: '#e8ecef',
                colorTextBase: '#1a1d20',
                fontFamily: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
            };

            const App = () => {
                const [isAuthenticated, setIsAuthenticated] = React.useState(false);
                const [loginError, setLoginError] = React.useState(false);
                const [activeMenu, setActiveMenu] = React.useState('axi_select');
                const [currentUser, setCurrentUser] = React.useState(null);

                // User Management State
                const [users, setUsers] = React.useState(() => {
                    const saved = localStorage.getItem('optimaze_users');
                    if (saved) {
                        try { return JSON.parse(saved); } catch (e) { return []; }
                    }
                    return [{ id: 1, username: 'admin', password: 'optimaze', role: 'admin' }];
                });

                React.useEffect(() => {
                    localStorage.setItem('optimaze_users', JSON.stringify(users));
                }, [users]);

                const [isUserModalVisible, setIsUserModalVisible] = React.useState(false);
                const [userForm] = Form.useForm();


                // Axi Select State
                const [axiParams, setAxiParams] = React.useState(() => {
                    const saved = localStorage.getItem('optimaze_axi_params');
                    if (saved) {
                        try { return JSON.parse(saved); } catch (e) { return null; }
                    }
                    return { skill: 80, risk: 75, consistency: 85, experience: 70 };
                });

                React.useEffect(() => {
                    localStorage.setItem('optimaze_axi_params', JSON.stringify(axiParams));
                }, [axiParams]);

                const calculateEdgeScore = () => {
                    return Math.round((axiParams.skill + axiParams.risk + axiParams.consistency + axiParams.experience) / 4);
                };

                const handleAxiParamChange = (field, value) => {
                    setAxiParams({ ...axiParams, [field]: value });
                };

                // Axi Select Extensions (Edge History & Profitability)
                const [edgeHistory, setEdgeHistory] = React.useState(() => {
                    const saved = localStorage.getItem('optimaze_edge_history');
                    if (saved) {
                        try {
                            const parsed = JSON.parse(saved);
                            // Filter legacy array elements which might be missing dateString
                            const validRecords = parsed.filter(item => item && item.dateString && typeof item.score === 'number');
                            if (validRecords.length > 0) return validRecords;
                        } catch (e) {
                            console.error("Failed to parse edgeHistory from localStorage", e);
                        }
                    }
                    return [
                        { id: 1, dateString: '2026-01-01', score: 50 },
                        { id: 2, dateString: dayjs().format('YYYY-MM-DD'), score: calculateEdgeScore() }
                    ];
                });

                const [newEdgeDate, setNewEdgeDate] = React.useState(null);
                const [newEdgeScore, setNewEdgeScore] = React.useState(null);

                const handleAddEdgeRecord = () => {
                    if (!newEdgeDate || newEdgeScore === null) {
                        message.warning('Por favor ingrese fecha y score.');
                        return;
                    }
                    const newRecord = {
                        id: Date.now(),
                        dateString: newEdgeDate.format('YYYY-MM-DD'),
                        score: newEdgeScore
                    };

                    const updatedHistory = [...edgeHistory, newRecord].sort((a, b) => new Date(a.dateString) - new Date(b.dateString));
                    setEdgeHistory(updatedHistory);
                    setNewEdgeDate(null);
                    setNewEdgeScore(null);
                    message.success('Registro añadido correctamente.');
                };

                const handleDeleteEdgeRecord = (id) => {
                    if (edgeHistory.length <= 1) {
                        message.warning('Debe mantener al menos un registro.');
                        return;
                    }
                    setEdgeHistory(edgeHistory.filter(item => item.id !== id));
                    message.success('Registro eliminado.');
                };

                React.useEffect(() => {
                    localStorage.setItem('optimaze_edge_history', JSON.stringify(edgeHistory));
                }, [edgeHistory]);

                const [monthlyProfitability, setMonthlyProfitability] = React.useState(() => {
                    const saved = localStorage.getItem('optimaze_monthly_profitability');
                    if (saved) {
                        try { return JSON.parse(saved); } catch (e) { return []; }
                    }
                    return [
                        { id: 1, month: 'Enero 2026', percentage: 2.5, amount: 1250 },
                        { id: 2, month: 'Febrero 2026', percentage: 3.1, amount: 1550 }
                    ];
                });

                React.useEffect(() => {
                    localStorage.setItem('optimaze_monthly_profitability', JSON.stringify(monthlyProfitability));
                }, [monthlyProfitability]);

                // Rendimiento Modal State
                const [isMonthlyModalVisible, setIsMonthlyModalVisible] = React.useState(false);
                const [monthlyForm] = Form.useForm();

                const handleAddMonthlyRecord = () => {
                    monthlyForm.validateFields().then(values => {
                        const newRecord = {
                            id: Date.now(),
                            month: values.month,
                            percentage: values.percentage,
                            amount: values.amount
                        };
                        const updatedRecords = [...monthlyProfitability, newRecord];
                        setMonthlyProfitability(updatedRecords);
                        setIsMonthlyModalVisible(false);
                        monthlyForm.resetFields();
                        message.success('Mes de rendimiento guardado correctamente.');
                    }).catch(info => {
                        console.log('Validate Failed:', info);
                    });
                };


                // Axi Real State
                const [axiRealData, setAxiRealData] = React.useState({
                    balance: 5050.50,
                    equity: 5120.00,
                    history: [
                        { key: '1', date: '2026-02-23', balance: 5000.00, equity: 5050.50, pnl: 50.50 },
                        { key: '2', date: '2026-02-24', balance: 5050.50, equity: 5120.00, pnl: 69.50 }
                    ]
                });

                // Prop Trading State
                const [propTradingData, setPropTradingData] = React.useState(() => {
                    const saved = localStorage.getItem('optimaze_prop_trading');
                    if (saved) {
                        try { return JSON.parse(saved); } catch (e) { return []; }
                    }
                    return [
                        { id: '1', name: 'Tradeify PA #1', firm: 'Tradeify', balance: 50000.00, pnlDiario: 850.00, goal: 53000.00, type: 'Fase 1' },
                        { id: '2', name: 'Topstep 150K', firm: 'Topstep', balance: 151200.00, pnlDiario: -200, goal: 159000.00, type: 'Real' }
                    ];
                });

                React.useEffect(() => {
                    localStorage.setItem('optimaze_prop_trading', JSON.stringify(propTradingData));
                }, [propTradingData]);

                const [isPropModalVisible, setIsPropModalVisible] = React.useState(false);
                const [propForm] = Form.useForm();

                const getProgressPercent = (balanceNew, goal) => {
                    if (!goal || !balanceNew) return 0;
                    const percent = (balanceNew / goal) * 100;
                    return Math.min(Math.max(percent, 0), 100).toFixed(1);
                };

                const getProgressColor = (percent) => {
                    if (percent >= 100) return '#00b96b'; // Light theme green success
                    if (percent >= 80) return '#1677ff'; // AntD Blue
                    if (percent >= 50) return '#faad14'; // Yellow/Orange
                    return '#ff4d4f'; // Red/Danger
                };
                // Micro-Accounting State
                const [transactions, setTransactions] = React.useState(() => {
                    const saved = localStorage.getItem('optimaze_accounting');
                    if (saved) {
                        try { return JSON.parse(saved); } catch (e) { return []; }
                    }
                    return [
                        { id: 1, type: 'INCOME', category: 'Retiro Axi', amount: 3500, date: '2026-02-01', currency: 'USD' },
                        { id: 2, type: 'EXPENSE', category: 'Capital de Trabajo', amount: 500, date: '2026-02-02', currency: 'USD' },
                        { id: 3, type: 'EXPENSE', category: 'Activos Amortizables', amount: 1200, date: '2026-02-15', currency: 'USD', usefulLifeMonths: 12 }
                    ];
                });

                React.useEffect(() => {
                    localStorage.setItem('optimaze_accounting', JSON.stringify(transactions));
                }, [transactions]);

                const [isExpenseModalVisible, setIsExpenseModalVisible] = React.useState(false);
                const [isIncomeModalVisible, setIsIncomeModalVisible] = React.useState(false);
                const [expenseForm] = Form.useForm();
                const [incomeForm] = Form.useForm();

                const expenseCurrency = Form.useWatch('currency', expenseForm);
                const expenseCategory = Form.useWatch('category', expenseForm);

                // Financial Calculations
                const today = new Date();
                let inversionFlota = 0;
                let valorActivosBruto = 0;
                let depreciacionAcumulada = 0;
                let gastosServicios = 0;
                let totalIngresos = 0;

                transactions.forEach(t => {
                    const amountUSD = t.currency === 'ARS' ? (t.amount / t.exchangeRate) : t.amount;
                    if (t.type === 'INCOME') {
                        totalIngresos += amountUSD;
                    } else if (t.type === 'EXPENSE') {
                        if (t.category === 'Capital de Trabajo') {
                            inversionFlota += amountUSD;
                        } else if (t.category === 'Servicios') {
                            gastosServicios += amountUSD;
                        } else if (t.category === 'Activos Amortizables') {
                            valorActivosBruto += amountUSD;
                            if (t.usefulLifeMonths) {
                                const txDate = new Date(t.date);
                                const diffTime = Math.abs(today - txDate);
                                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                const diffMonths = diffDays / 30.44;
                                const monthlyDepreciation = amountUSD / t.usefulLifeMonths;
                                const totalDepreciated = Math.min(amountUSD, diffMonths * monthlyDepreciation);
                                depreciacionAcumulada += totalDepreciated;
                            } else {
                                depreciacionAcumulada += amountUSD;
                            }
                        }
                    }
                });

                const totalGastosReales = inversionFlota + gastosServicios + depreciacionAcumulada;
                const beneficioNetoReal = totalIngresos - totalGastosReales;
                const valorActivosNeto = valorActivosBruto - depreciacionAcumulada;

                const handleExpenseSubmit = (values) => {
                    const newTx = { ...values, id: Date.now(), type: 'EXPENSE' };
                    setTransactions([...transactions, newTx]);
                    setIsExpenseModalVisible(false);
                    expenseForm.resetFields();
                    message.success('Gasto registrado con éxito.');
                };

                const handleIncomeSubmit = (values) => {
                    const newTx = { ...values, id: Date.now(), type: 'INCOME' };
                    setTransactions([...transactions, newTx]);
                    setIsIncomeModalVisible(false);
                    incomeForm.resetFields();
                    message.success('Cobro registrado con éxito.');
                };

                const handlePropSubmit = (values) => {
                    const newAcc = { ...values, id: Date.now().toString() };
                    setPropTradingData([...propTradingData, newAcc]);
                    setIsPropModalVisible(false);
                    propForm.resetFields();
                    message.success('Cuenta Prop agregada con éxito.');
                };

                const handleDeleteProp = (id) => {
                    setPropTradingData(propTradingData.filter(a => a.id !== id));
                    message.success('Cuenta Prop eliminada.');
                };


                const handleUserSubmit = (values) => {
                    const newUser = { ...values, id: Date.now(), role: 'user' };
                    setUsers([...users, newUser]);
                    setIsUserModalVisible(false);
                    userForm.resetFields();
                    message.success('Usuario creado con éxito.');
                };

                const handleDeleteUser = (id) => {
                    if (users.length === 1) {
                        message.error('No se puede eliminar el último usuario.');
                        return;
                    }
                    setUsers(users.filter(u => u.id !== id));
                    message.success('Usuario eliminado.');
                };

                const handleLogin = (values) => {
                    const validUser = users.find(u => u.username === values.username && u.password === values.password);
                    if (validUser) {
                        setIsAuthenticated(true);
                        setCurrentUser(validUser);
                        setLoginError(false);
                        message.success(`Acceso autorizado. Bienvenido ${validUser.username}.`);
                    } else {
                        setLoginError(true);
                        message.error('Usuario o contraseña incorrectos');
                    }
                };

                if (!isAuthenticated) {
                    return (
                        <ConfigProvider theme={{ token: LIGHT_MODE_VARS }}>
                            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '100vh', background: '#F8F9FA' }}>
                                <Card style={{ width: 350, boxShadow: '0 8px 24px rgba(0,0,0,0.05)', borderRadius: 12, border: '1px solid #e8ecef', background: '#ffffff' }}>
                                    <div style={{ textAlign: 'center', marginBottom: 24 }}>
                                        <h2 style={{ color: '#00b96b', margin: 0, paddingBottom: 8 }}>OPTIMAZE TRADING GROUP</h2>
                                        <Text type="secondary">Portal de Acceso</Text>
                                    </div>
                                    <Form onFinish={handleLogin} layout="vertical">
                                        <Form.Item name="username" rules={[{ required: true, message: 'Ingrese su usuario' }]}>
                                            <Input prefix={<UserOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} placeholder="Usuario" size="large" />
                                        </Form.Item>
                                        <Form.Item name="password" rules={[{ required: true, message: 'Ingrese su contraseña' }]}>
                                            <Input.Password prefix={<LockOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} placeholder="Contraseña" size="large" />
                                        </Form.Item>
                                        <Button type="primary" htmlType="submit" size="large" block style={{ marginTop: 8, background: '#00b96b', borderColor: '#00b96b' }}>
                                            Ingresar
                                        </Button>
                                    </Form>
                                </Card>
                            </div>
                        </ConfigProvider>
                    );
                }

                return (
                    <ConfigProvider
                        theme={{
                            token: LIGHT_MODE_VARS
                        }}
                    >
                        <>
                            <Layout style={{ minHeight: '100vh' }}>
                                <Sider width={250} style={{ background: '#ffffff' }}>
                                    <div className="logo">
                                        OPTIMAZE GROUP
                                    </div>
                                    <Menu
                                        theme="light"
                                        style={{ background: '#ffffff', borderRight: 0 }}
                                        mode="inline"
                                        selectedKeys={[activeMenu]}
                                        defaultOpenKeys={['axi']}
                                        items={[
                                            {
                                                key: 'axi',
                                                icon: <LineChartOutlined />,
                                                label: 'Axi',
                                                children: [
                                                    { key: 'axi_real', label: 'Axi Real' },
                                                    { key: 'axi_select', label: 'Axi Select' }
                                                ]
                                            },
                                            { key: 'prop_trading', icon: <DashboardOutlined />, label: 'Prop Trading' },
                                            { key: 'accounting', icon: <WalletOutlined />, label: 'Micro-Contabilidad' },
                                            { type: 'divider' },
                                            { key: 'users_settings', icon: <UserOutlined />, label: 'Config. / Usuarios' },
                                            { type: 'divider' },
                                            { key: 'logout', icon: <LogoutOutlined />, label: 'Cerrar Sesión', danger: true }
                                        ]}
                                        onClick={({ key }) => {
                                            if (key === 'logout') {
                                                setIsAuthenticated(false);
                                                message.info('Sesión cerrada.');
                                            } else {
                                                setActiveMenu(key);
                                            }
                                        }}
                                    />
                                </Sider>
                                <Layout className="site-layout" style={{ background: '#F8F9FA' }}>
                                    <Header style={{ padding: '0 24px', background: '#ffffff', borderBottom: '1px solid #e8ecef', display: 'flex', alignItems: 'center' }}>
                                        <Title level={4} style={{ margin: 0, color: '#1a1d20' }}>Dashboard Principal</Title>
                                    </Header>
                                    <Content style={{ margin: '24px 24px', overflow: 'initial' }}>

                                        <div style={{ marginBottom: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                            <div>
                                                <Title level={2} style={{ marginBottom: 4, color: '#1a1d20' }}>Hola, {currentUser?.username || 'Optimizador'} 👋</Title>
                                                <Text type="secondary" style={{ fontSize: 16 }}>Resumen de las métricas de trading.</Text>
                                            </div>
                                            {activeMenu === 'accounting' && (
                                                <Space>
                                                    <Button type="primary" danger icon={<FallOutlined />} onClick={() => setIsExpenseModalVisible(true)}>Registrar Gasto</Button>
                                                    <Button type="primary" icon={<RiseOutlined />} style={{ background: '#00b96b', borderColor: '#00b96b' }} onClick={() => setIsIncomeModalVisible(true)}>Registrar Cobro</Button>
                                                </Space>
                                            )}
                                        </div>

                                        {activeMenu === 'accounting' && (
                                            <Row gutter={24} style={{ marginBottom: 24 }}>
                                                <Col xs={24} sm={8}>
                                                    <Card className="premium-card" style={{ borderLeft: '4px solid #d29922' }}>
                                                        <Statistic
                                                            title="Inversión en Cap. Trabajo"
                                                            value={inversionFlota}
                                                            precision={2}
                                                            prefix="$"
                                                        />
                                                    </Card>
                                                </Col>
                                                <Col xs={24} sm={8}>
                                                    <Card className="premium-card" style={{ borderLeft: '4px solid #58a6ff' }}>
                                                        <Statistic
                                                            title="Valor Activos (Neto de Dep.)"
                                                            value={valorActivosNeto}
                                                            precision={2}
                                                            prefix="$"
                                                        />
                                                    </Card>
                                                </Col>
                                                <Col xs={24} sm={8}>
                                                    <Card className="premium-card" style={{ borderLeft: '4px solid #00b96b' }}>
                                                        <Statistic
                                                            title="Beneficio Neto Real"
                                                            value={beneficioNetoReal}
                                                            precision={2}
                                                            prefix="$"
                                                            valueStyle={{ color: beneficioNetoReal >= 0 ? '#00b96b' : '#ff4d4f' }}
                                                        />
                                                    </Card>
                                                </Col>
                                            </Row>
                                        )}

                                        {activeMenu === 'axi_select' && (
                                            <>
                                                <Card className="premium-card" style={{ marginBottom: 24, borderLeft: '4px solid #1677ff', width: '100%' }} bodyStyle={{ padding: '16px 24px' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                        <div>
                                                            <Text type="secondary" style={{ display: 'block', marginBottom: 4 }}>Estado de Sociedad</Text>
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                                                <Title level={3} style={{ margin: 0, color: '#1a1d20' }}>Axi Select: Acceleration</Title>
                                                                <Tag color="blue" style={{ margin: 0, borderRadius: 12, padding: '2px 12px' }}>Actual</Tag>
                                                            </div>
                                                        </div>
                                                        <div style={{ textAlign: 'right' }}>
                                                            <Text type="secondary">Siguiente Nivel: <strong style={{ color: '#1a1d20' }}>PRO</strong></Text>
                                                            <div style={{ marginTop: 4 }}>
                                                                <Text style={{ fontSize: 12, color: '#6c757d' }}>Requisitos faltantes:</Text>
                                                                <Input placeholder="Ej: Edge Score > 70, Retorno 5%" size="small" style={{ width: 220, marginLeft: 8 }} />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div style={{ marginTop: 24 }}>
                                                        <Progress
                                                            percent={50}
                                                            showInfo={false}
                                                            strokeColor="#1677ff"
                                                            trailColor="#e8ecef"
                                                        />
                                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 12, color: '#6c757d', fontWeight: 500 }}>
                                                            <span>Seed</span>
                                                            <span>Incubation</span>
                                                            <span style={{ color: '#1677ff', fontWeight: 700 }}>Acceleration</span>
                                                            <span>Pro</span>
                                                            <span>Pro 500</span>
                                                            <span>Pro M</span>
                                                        </div>
                                                    </div>
                                                </Card>

                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <div>
                                                        <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Axi Edge Score</Title>
                                                        <Text type="secondary">Evaluación multidimensional de tu edge de trading.</Text>
                                                    </div>
                                                </div>

                                                <Row gutter={24} align="top">
                                                    <Col xs={24} md={24}>
                                                        <Card className="premium-card" title="Axi Edge Score" bodyStyle={{ padding: '24px' }}>
                                                            <Row gutter={24} align="top">
                                                                {/* Left Side: Big Edge Score Circle */}

                                                                        strokeWidth={8}

                                                                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                                                                                <span style={{ fontSize: '56px', fontWeight: 'bold', color: '#1a1d20', lineHeight: 1, paddingBottom: '8px' }}>{percent}</span>
                                                                                <span style={{ fontSize: '14px', color: '#6c757d', marginTop: '4px' }}>Puntuación Edge</span>
                                                                            </div>

                                                                    <div style={{ marginTop: '32px', width: '100%', display: 'flex', justifyContent: 'center' }}>
                                                                        <div style={{ width: 220, height: 220 }}>
                                                                            <ResponsiveContainer width="100%" height="100%">
                                                                                <RadarChart cx="50%" cy="50%" outerRadius="70%" data={[
                                                                                    { subject: 'Skill', A: axiParams.skill, fullMark: 100 },
                                                                                    { subject: 'Risk', A: axiParams.risk, fullMark: 100 },
                                                                                    { subject: 'Consistency', A: axiParams.consistency, fullMark: 100 },
                                                                                    { subject: 'Experience', A: axiParams.experience, fullMark: 100 }

                                                                                    <PolarGrid gridType="polygon" />
                                                                                    <PolarAngleAxis dataKey="subject" tick={{ fill: '#6c757d', fontSize: 11 }} />
                                                                                    <Radar name="Axi Edge" dataKey="A" stroke="#00b96b" fill="#00b96b" fillOpacity={0.25} />
                                                                                </RadarChart>
                                                                            </ResponsiveContainer>
                                                                        </div>
                                                                    </div>
                                                                </Col>

                                                                {/* Right Side: 4 Small Circles & History Chart */}
                                                                <Col xs={24} md={16} style={{ paddingLeft: '32px' }}>

                                                                    <div style={{ display: 'flex', justifyContent: 'space-around', marginBottom: '40px', marginTop: '16px' }}>
                                                                        <div style={{ textAlign: 'center' }}>
                                                                            <Progress type="circle" percent={axiParams.skill} strokeColor="#00b96b" size={76} strokeWidth={8} />
                                                                            <div style={{ marginTop: '12px', color: '#6c757d', fontSize: '13px', fontWeight: 600 }}>Habilidad</div>
                                                                        </div>
                                                                        <div style={{ textAlign: 'center' }}>
                                                                            <Progress type="circle" percent={axiParams.risk} strokeColor="#00b96b" size={76} strokeWidth={8} />
                                                                            <div style={{ marginTop: '12px', color: '#6c757d', fontSize: '13px', fontWeight: 600 }}>Riesgo</div>
                                                                        </div>
                                                                        <div style={{ textAlign: 'center' }}>
                                                                            <Progress type="circle" percent={axiParams.consistency} strokeColor="#00b96b" size={76} strokeWidth={8} />
                                                                            <div style={{ marginTop: '12px', color: '#6c757d', fontSize: '13px', fontWeight: 600 }}>Consistencia</div>
                                                                        </div>
                                                                        <div style={{ textAlign: 'center' }}>
                                                                            <Progress type="circle" percent={axiParams.experience} strokeColor="#00b96b" size={76} strokeWidth={8} />
                                                                            <div style={{ marginTop: '12px', color: '#6c757d', fontSize: '13px', fontWeight: 600 }}>Experiencia</div>
                                                                        </div>
                                                                    </div>

                                                                            <DatePicker
                                                                                value={newEdgeDate}
                                                                                onChange={setNewEdgeDate}
