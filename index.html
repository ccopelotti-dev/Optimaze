<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimaze Trading Group</title>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Ant Design CSS and JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/reset.min.css"
        integrity="sha512-H/iMbm5C4a1B2UaA+2k+2E8Z4M9w2K6V7d+B7b7Y3wW7V2C8m3Y8+D7c8m3Y3B7V2C8m3Y8+D7c8m3Y3B7Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Ant Design Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/antd.min.js"></script>

    <!-- Ant Design Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ant-design-icons/5.2.6/index.umd.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            /* Light mode background */
            color: #1a1d20;
            /* Light mode text */
        }

        .premium-card {
            background-color: #ffffff;
            border: 1px solid #e8ecef;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        .premium-card .ant-card-head {
            border-bottom: 1px solid #e8ecef;
            color: #1a1d20;
        }

        .premium-card .ant-card-body {
            color: #495057;
        }

        .premium-card .ant-statistic-title {
            color: #6c757d;
        }

        .premium-card .ant-statistic-content {
            color: #1a1d20;
        }

        /* Light Sidebar Override */
        .ant-layout-sider {
            border-right: 1px solid #e8ecef;
        }

        .logo {
            height: 32px;
            margin: 16px;
            color: #00b96b;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #F8F9FA;
        }

        ::-webkit-scrollbar-thumb {
            background: #dee2e6;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ced4da;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        try {
            const { Layout, Menu, Typography, Card, Row, Col, Table, Tag, Statistic, ConfigProvider, theme, Progress, Button, Modal, Form, Input, InputNumber, Space, message, Select, DatePicker, Slider, Divider } = antd;
            const { Header, Content, Sider } = Layout;
            const { Title, Text } = Typography;
            const { RangePicker } = DatePicker;
            const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, BarChart, Bar, Cell, Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis } = Recharts;

            // Fallback for icons if AntDesignIcons is used instead of icons
            const IconsObj = typeof icons !== 'undefined' ? icons : (window.icons || window.AntDesignIcons || {});
            const { DashboardOutlined, LineChartOutlined, WalletOutlined, BankOutlined, RiseOutlined, EditOutlined, UploadOutlined, PlusOutlined, UserOutlined, DeleteOutlined, FallOutlined, DollarOutlined, BarChartOutlined, CheckCircleOutlined, LockOutlined, LogoutOutlined } = IconsObj;

            const LIGHT_MODE_VARS = {
                colorPrimary: '#00b96b',
                colorBgBase: '#F8F9FA',
                colorBgContainer: '#ffffff',
                colorBorder: '#e8ecef',
                colorTextBase: '#1a1d20',
                fontFamily: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
            };

            const App = () => {
                const supabaseUrl = 'https://dppbmtswplkfryxjfeee.supabase.co';
                const supabaseKey = 'sb_publishable_C39Ln4C8ZY-P3oNIqBTLxw_QwFotQ-i';
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                const [isAuthenticated, setIsAuthenticated] = React.useState(false);
                const [loginError, setLoginError] = React.useState(false);
                const [activeMenu, setActiveMenu] = React.useState('axi_select');
                const [currentUser, setCurrentUser] = React.useState(null);

                // User Management State
                const [users, setUsers] = React.useState([]);

                React.useEffect(() => {
                    const fetchUsers = async () => {
                        const { data } = await supabase.from('users').select('*');
                        if (data) setUsers(data);
                    };
                    fetchUsers();
                }, []);

                const [isUserModalVisible, setIsUserModalVisible] = React.useState(false);
                const [userForm] = Form.useForm();


                // Axi Select State
                const [axiParams, setAxiParams] = React.useState({ skill: 80, risk: 75, consistency: 85, experience: 70, stage: 'Acceleration' });

                React.useEffect(() => {
                    const fetchAxiParams = async () => {
                        const { data } = await supabase.from('axi_select_data').select('*').single();
                        if (data) {
                            setAxiParams({
                                id: data.id,
                                skill: data.skill || 80,
                                risk: data.risk || 75,
                                consistency: data.consistency || 85,
                                experience: data.experience || 70,
                                stage: data.stage || 'Acceleration'
                            });
                        }
                    };
                    fetchAxiParams();
                }, []);

                const calculateEdgeScore = () => {
                    return Math.round((axiParams.skill + axiParams.risk + axiParams.consistency + axiParams.experience) / 4);
                };

                const handleAxiParamChange = async (field, value) => {
                    const updatedParams = { ...axiParams, [field]: value };
                    setAxiParams(updatedParams);
                    if (axiParams.id) {
                        await supabase.from('axi_select_data').update({ [field]: value }).eq('id', axiParams.id);
                    } else {
                        const { data } = await supabase.from('axi_select_data').insert([updatedParams]).select().single();
                        if (data) setAxiParams({ ...updatedParams, id: data.id });
                    }
                };

                // Axi Select Extensions (Edge History & Profitability)
                const [edgeHistory, setEdgeHistory] = React.useState([]);

                React.useEffect(() => {
                    const fetchEdgeHistory = async () => {
                        const { data } = await supabase.from('edge_history').select('*').order('dateString', { ascending: true });
                        if (data) setEdgeHistory(data);
                    };
                    fetchEdgeHistory();
                }, []);

                const [newEdgeDate, setNewEdgeDate] = React.useState(null);
                const [newEdgeScore, setNewEdgeScore] = React.useState(null);

                const handleAddEdgeRecord = async () => {
                    if (!newEdgeDate || newEdgeScore === null) {
                        message.warning('Por favor ingrese fecha y score.');
                        return;
                    }
                    const newRecord = { dateString: newEdgeDate.format('YYYY-MM-DD'), score: newEdgeScore };
                    const { data, error } = await supabase.from('edge_history').insert([newRecord]).select();
                    if (data && data.length > 0) {
                        const updatedHistory = [...edgeHistory, data[0]].sort((a, b) => new Date(a.dateString) - new Date(b.dateString));
                        setEdgeHistory(updatedHistory);
                        setNewEdgeDate(null);
                        setNewEdgeScore(null);
                        message.success('Registro añadido correctamente.');
                    } else {
                        message.error('Error al añadir registro.');
                    }
                };

                const handleDeleteEdgeRecord = async (id) => {
                    if (edgeHistory.length <= 1) {
                        message.warning('Debe mantener al menos un registro.');
                        return;
                    }
                    const { error } = await supabase.from('edge_history').delete().eq('id', id);
                    if (!error) {
                        setEdgeHistory(edgeHistory.filter(item => item.id !== id));
                        message.success('Registro eliminado.');
                    } else {
                        message.error('Error al eliminar registro');
                    }
                };

                const [monthlyProfitability, setMonthlyProfitability] = React.useState([]);

                React.useEffect(() => {
                    const fetchMonthly = async () => {
                        const { data } = await supabase.from('monthly_profitability').select('*');
                        if (data) setMonthlyProfitability(data);
                    };
                    fetchMonthly();
                }, []);

                // Rendimiento Modal State
                const [isMonthlyModalVisible, setIsMonthlyModalVisible] = React.useState(false);
                const [monthlyForm] = Form.useForm();

                const handleAddMonthlyRecord = async () => {
                    try {
                        const values = await monthlyForm.validateFields();
                        const newRecord = { month: values.month, percentage: values.percentage, amount: values.amount };
                        const { data, error } = await supabase.from('monthly_profitability').insert([newRecord]).select();
                        if (data && data.length > 0) {
                            setMonthlyProfitability([...monthlyProfitability, data[0]]);
                            setIsMonthlyModalVisible(false);
                            monthlyForm.resetFields();
                            message.success('Mes de rendimiento guardado correctamente.');
                        } else {
                            message.error('Error al guardar el mes.');
                        }
                    } catch (info) {
                        console.log('Validate Failed:', info);
                    }
                };


                // Axi Real State
                const [axiRealData, setAxiRealData] = React.useState({
                    balance: 5050.50,
                    equity: 5120.00,
                    history: [
                        { key: '1', date: '2026-02-23', balance: 5000.00, equity: 5050.50, pnl: 50.50 },
                        { key: '2', date: '2026-02-24', balance: 5050.50, equity: 5120.00, pnl: 69.50 }
                    ]
                });

                // Prop Trading State
                const [propTradingData, setPropTradingData] = React.useState([]);

                React.useEffect(() => {
                    const fetchPropTrading = async () => {
                        const { data } = await supabase.from('prop_accounts').select('*');
                        if (data) setPropTradingData(data);
                    };
                    fetchPropTrading();
                }, []);

                const [isPropModalVisible, setIsPropModalVisible] = React.useState(false);
                const [propForm] = Form.useForm();

                const getProgressPercent = (balanceNew, balanceInitial, goal) => {
                    if (!goal) return 0;
                    if (balanceNew === balanceInitial) return 0;
                    const percent = ((balanceNew - balanceInitial) / goal) * 100;
                    return parseFloat(percent.toFixed(1));
                };

                const getProgressColor = (percent) => {
                    if (percent >= 100) return '#00b96b'; // Light theme green success
                    if (percent >= 80) return '#1677ff'; // AntD Blue
                    if (percent >= 50) return '#faad14'; // Yellow/Orange
                    return '#ff4d4f'; // Red/Danger
                };
                // Micro-Accounting State
                const [transactions, setTransactions] = React.useState([]);

                const fetchTransactions = async () => {
                    const { data, error } = await supabase.from('accounting').select('*').order('date', { ascending: false });
                    if (data) setTransactions(data);
                };

                React.useEffect(() => {
                    fetchTransactions();
                }, []);

                const [isMovementModalVisible, setIsMovementModalVisible] = React.useState(false);
                const [movementForm] = Form.useForm();

                // Financial Calculations
                let totalIncome = 0;
                let totalExpense = 0;

                transactions.forEach(t => {
                    const amountUSD = Number(t.amount) || 0;
                    if (t.type === 'INCOME') {
                        totalIncome += amountUSD;
                    } else if (t.type === 'EXPENSE') {
                        totalExpense += amountUSD;
                    }
                });

                const beneficioNetoReal = totalIncome - totalExpense;
                const capitalDeTrabajo = totalIncome - totalExpense;

                const handleMovementSubmit = async (values) => {
                    const newTx = {
                        date: dayjs().format('YYYY-MM-DD'),
                        type: values.type,
                        category: values.category,
                        amount: values.amount,
                        description: values.description || ''
                    };
                    const { data, error } = await supabase.from('accounting').insert([newTx]).select();
                    if (data && data.length > 0) {
                        message.success('Movimiento registrado con éxito.');
                        setIsMovementModalVisible(false);
                        movementForm.resetFields();
                        fetchTransactions();
                    } else {
                        message.error('Error al registrar movimiento.');
                    }
                };

                const handlePropSubmit = async (values) => {
                    const newAcc = {
                        firm: values.firm, name: values.name, type: values.type,
                        balance: values.balance, pnlDiario: values.pnlDiario, goal: values.goal
                    };
                    const { data, error } = await supabase.from('prop_accounts').insert([newAcc]).select();
                    if (data && data.length > 0) {
                        setPropTradingData([...propTradingData, data[0]]);
                        setIsPropModalVisible(false);
                        propForm.resetFields();
                        message.success('Cuenta Prop agregada con éxito.');
                    } else {
                        message.error('Error al agregar cuenta Prop.');
                    }
                };

                const handleDeleteProp = async (id) => {
                    const { error } = await supabase.from('prop_accounts').delete().eq('id', id);
                    if (!error) {
                        setPropTradingData(propTradingData.filter(a => a.id !== id));
                        message.success('Cuenta Prop eliminada.');
                    } else {
                        message.error('Error al eliminar cuenta Prop.');
                    }
                };


                const handleUserSubmit = async (values) => {
                    const newUser = { username: values.username, password: values.password, role: 'user' };
                    const { data, error } = await supabase.from('users').insert([newUser]).select();
                    if (data && data.length > 0) {
                        setUsers([...users, data[0]]);
                        setIsUserModalVisible(false);
                        userForm.resetFields();
                        message.success('Usuario creado con éxito.');
                    } else {
                        message.error('Error al crear usuario.');
                    }
                };

                const handleDeleteUser = async (id) => {
                    if (users.length === 1) {
                        message.error('No se puede eliminar el último usuario.');
                        return;
                    }
                    const { error } = await supabase.from('users').delete().eq('id', id);
                    if (!error) {
                        setUsers(users.filter(u => u.id !== id));
                        message.success('Usuario eliminado.');
                    } else {
                        message.error('Error al eliminar usuario.');
                    }
                };

                const handleLogin = async (values) => {
                    let { data: validUser, error } = await supabase.from('users')
                        .select('*')
                        .eq('username', values.username)
                        .eq('password', values.password)
                        .single();

                    if (!validUser && values.username === 'admin' && values.password === 'optimaze') {
                        const { data: allUsers } = await supabase.from('users').select('*');
                        if (!allUsers || allUsers.length === 0) {
                            const { data: newUser } = await supabase.from('users').insert([
                                { username: 'admin', password: 'optimaze', role: 'admin' }
                            ]).select().single();
                            if (newUser) {
                                validUser = newUser;
                                setUsers([validUser]);
                            }
                        }
                    }

                    if (validUser) {
                        setIsAuthenticated(true);
                        setCurrentUser(validUser);
                        setLoginError(false);
                        message.success(`Acceso autorizado. Bienvenido ${validUser.username}.`);
                    } else {
                        setLoginError(true);
                        message.error('Usuario o contraseña incorrectos');
                    }
                };

                if (!isAuthenticated) {
                    return (
                        <ConfigProvider theme={{ token: LIGHT_MODE_VARS }}>
                            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '100vh', background: '#F8F9FA' }}>
                                <Card style={{ width: 350, boxShadow: '0 8px 24px rgba(0,0,0,0.05)', borderRadius: 12, border: '1px solid #e8ecef', background: '#ffffff' }}>
                                    <div style={{ textAlign: 'center', marginBottom: 24 }}>
                                        <h2 style={{ color: '#00b96b', margin: 0, paddingBottom: 8 }}>OPTIMAZE TRADING GROUP</h2>
                                        <Text type="secondary">Portal de Acceso</Text>
                                    </div>
                                    <Form onFinish={handleLogin} layout="vertical">
                                        <Form.Item name="username" rules={[{ required: true, message: 'Ingrese su usuario' }]}>
                                            <Input prefix={<UserOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} placeholder="Usuario" size="large" />
                                        </Form.Item>
                                        <Form.Item name="password" rules={[{ required: true, message: 'Ingrese su contraseña' }]}>
                                            <Input.Password prefix={<LockOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} placeholder="Contraseña" size="large" />
                                        </Form.Item>
                                        <Button type="primary" htmlType="submit" size="large" block style={{ marginTop: 8, background: '#00b96b', borderColor: '#00b96b' }}>
                                            Ingresar
                                        </Button>
                                    </Form>
                                </Card>
                            </div>
                        </ConfigProvider>
                    );
                }

                return (
                    <ConfigProvider
                        theme={{
                            token: LIGHT_MODE_VARS
                        }}
                    >
                        <>
                            <Layout style={{ minHeight: '100vh' }}>
                                <Sider width={250} style={{ background: '#ffffff' }}>
                                    <div className="logo">
                                        OPTIMAZE GROUP
                                    </div>
                                    <Menu
                                        theme="light"
                                        style={{ background: '#ffffff', borderRight: 0 }}
                                        mode="inline"
                                        selectedKeys={[activeMenu]}
                                        defaultOpenKeys={['axi']}
                                        items={[
                                            {
                                                key: 'axi',
                                                icon: <LineChartOutlined />,
                                                label: 'Axi',
                                                children: [
                                                    { key: 'axi_real', label: 'Axi Real' },
                                                    { key: 'axi_select', label: 'Axi Select' }
                                                ]
                                            },
                                            { key: 'prop_trading', icon: <DashboardOutlined />, label: 'Prop Trading' },
                                            { key: 'accounting', icon: <WalletOutlined />, label: 'Micro-Contabilidad' },
                                            { type: 'divider' },
                                            { key: 'users_settings', icon: <UserOutlined />, label: 'Config. / Usuarios' },
                                            { type: 'divider' },
                                            { key: 'logout', icon: <LogoutOutlined />, label: 'Cerrar Sesión', danger: true }
                                        ]}
                                        onClick={({ key }) => {
                                            if (key === 'logout') {
                                                setIsAuthenticated(false);
                                                message.info('Sesión cerrada.');
                                            } else {
                                                setActiveMenu(key);
                                            }
                                        }}
                                    />
                                </Sider>
                                <Layout className="site-layout" style={{ background: '#F8F9FA' }}>
                                    <Header style={{ padding: '0 24px', background: '#ffffff', borderBottom: '1px solid #e8ecef', display: 'flex', alignItems: 'center' }}>
                                        <Title level={4} style={{ margin: 0, color: '#1a1d20' }}>Dashboard Principal</Title>
                                    </Header>
                                    <Content style={{ margin: '24px 24px', overflow: 'initial' }}>

                                        <div style={{ marginBottom: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                            <div>
                                                <Title level={2} style={{ marginBottom: 4, color: '#1a1d20' }}>Hola, {currentUser?.username || 'Optimizador'} 👋</Title>
                                                <Text type="secondary" style={{ fontSize: 16 }}>Resumen de las métricas de trading.</Text>
                                            </div>
                                            {activeMenu === 'accounting' && (
                                                <Space>
                                                    <Button type="primary" icon={<PlusOutlined />} style={{ background: '#00b96b', borderColor: '#00b96b' }} onClick={() => setIsMovementModalVisible(true)}>Registrar Movimiento</Button>
                                                </Space>
                                            )}
                                        </div>

                                        {activeMenu === 'accounting' && (
                                            <Row gutter={24} style={{ marginBottom: 24 }}>
                                                <Col xs={24} sm={12}>
                                                    <Card className="premium-card" style={{ borderLeft: '4px solid #1677ff' }}>
                                                        <Statistic
                                                            title="Capital de Trabajo"
                                                            value={capitalDeTrabajo}
                                                            precision={2}
                                                            prefix="$"
                                                            valueStyle={{ color: capitalDeTrabajo >= 0 ? '#1677ff' : '#ff4d4f' }}
                                                        />
                                                    </Card>
                                                </Col>
                                                <Col xs={24} sm={12}>
                                                    <Card className="premium-card" style={{ borderLeft: '4px solid #00b96b' }}>
                                                        <Statistic
                                                            title="Beneficio Neto"
                                                            value={beneficioNetoReal}
                                                            precision={2}
                                                            prefix="$"
                                                            valueStyle={{ color: beneficioNetoReal >= 0 ? '#00b96b' : '#ff4d4f' }}
                                                        />
                                                    </Card>
                                                </Col>
                                            </Row>
                                        )}

                                        {activeMenu === 'axi_select' && (
                                            <>
                                                <Card className="premium-card" style={{ marginBottom: 24, borderLeft: '4px solid #1677ff', width: '100%' }} bodyStyle={{ padding: '16px 24px' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                        <div>
                                                            <Text type="secondary" style={{ display: 'block', marginBottom: 4 }}>Estado de Sociedad</Text>
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                                                <Title level={3} style={{ margin: 0, color: '#1a1d20' }}>Axi Select: {axiParams.stage}</Title>
                                                                <Select value={axiParams.stage} onChange={(val) => handleAxiParamChange('stage', val)} style={{ width: 140 }}>
                                                                    <Select.Option value="Seed">Seed</Select.Option>
                                                                    <Select.Option value="Incubation">Incubation</Select.Option>
                                                                    <Select.Option value="Acceleration">Acceleration</Select.Option>
                                                                    <Select.Option value="Pro">Pro</Select.Option>
                                                                    <Select.Option value="Pro 500">Pro 500</Select.Option>
                                                                    <Select.Option value="Pro M">Pro M</Select.Option>
                                                                </Select>
                                                                <Tag color="blue" style={{ margin: 0, borderRadius: 12, padding: '2px 12px' }}>Actual</Tag>
                                                            </div>
                                                        </div>
                                                        <div style={{ textAlign: 'right' }}>
                                                            <Text type="secondary">Siguiente Nivel: <strong style={{ color: '#1a1d20' }}>PRO</strong></Text>
                                                            <div style={{ marginTop: 4 }}>
                                                                <Text style={{ fontSize: 12, color: '#6c757d' }}>Requisitos faltantes:</Text>
                                                                <Input placeholder="Ej: Edge Score > 70, Retorno 5%" size="small" style={{ width: 220, marginLeft: 8 }} />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div style={{ marginTop: 24 }}>
                                                        <Progress
                                                            percent={50}
                                                            showInfo={false}
                                                            strokeColor="#1677ff"
                                                            trailColor="#e8ecef"
                                                        />
                                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 12, color: '#6c757d', fontWeight: 500 }}>
                                                            <span>Seed</span>
                                                            <span>Incubation</span>
                                                            <span style={{ color: '#1677ff', fontWeight: 700 }}>Acceleration</span>
                                                            <span>Pro</span>
                                                            <span>Pro 500</span>
                                                            <span>Pro M</span>
                                                        </div>
                                                    </div>
                                                </Card>

                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <div>
                                                        <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Axi Edge Score</Title>
                                                        <Text type="secondary">Evaluación multidimensional de tu edge de trading.</Text>
                                                    </div>
                                                </div>

                                                <Row gutter={24} align="top">
                                                    <Col xs={24} md={24}>
                                                        <Card className="premium-card" title="Axi Edge Score" bodyStyle={{ padding: '24px' }}>
                                                            <Row gutter={24} align="top">
                                                                {/* Left Side: Big Edge Score Circle */}

                                                                        <div style={{ textAlign: 'center' }}>
                                                                            <Progress type="circle" percent={axiParams.risk} strokeColor="#00b96b" size={76} strokeWidth={8} />
                                                                            <div style={{ marginTop: '12px', color: '#6c757d', fontSize: '13px', fontWeight: 600 }}>Riesgo</div>
                                                                        </div>
                                                                        <div style={{ textAlign: 'center' }}>
                                                                            <Progress type="circle" percent={axiParams.consistency} strokeColor="#00b96b" size={76} strokeWidth={8} />
                                                                            <div style={{ marginTop: '12px', color: '#6c757d', fontSize: '13px', fontWeight: 600 }}>Consistencia</div>

                                                                            <Progress type="circle" percent={axiParams.experience} strokeColor="#00b96b" size={76} strokeWidth={8} />
                                                                            <div style={{ marginTop: '12px', color: '#6c757d', fontSize: '13px', fontWeight: 600 }}>Experiencia</div>

                                                                                Añadir

                                                                        {edgeHistory && edgeHistory.length > 0 ? (
                                                                            <>

                                                                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e8ecef" />

                                                                                                contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}

                                                                                            <Line key={`line-${edgeHistory.length}`} type="monotone" dataKey="score" stroke="#00b96b" strokeWidth={3} dot={{ r: 4, strokeWidth: 2, fill: '#fff', stroke: '#00b96b' }} activeDot={{ r: 6 }} isAnimationActive={false} />
                                                                                        </LineChart>
                                                                                    </ResponsiveContainer>
                                                                                </div>
                                                                                <div style={{ display: 'none' }}>
                                                                                    <Table
                                                                                        dataSource={edgeHistory}
                                                                                        rowKey="id"

                                                                                        pagination={{ pageSize: 3, position: ['bottomCenter'] }}
                                                                                        columns={[
                                                                                            { title: 'Fecha', dataIndex: 'dateString', key: 'dateString', render: (val) => dayjs(val).format('DD/MM/YYYY') },
                                                                                            { title: 'Score', dataIndex: 'score', key: 'score', render: (val) => <strong style={{ color: '#1a1d20' }}>{val}</strong> },

                                                                </Col>

                                                        </Card>
                                                    </Col>
                                                    <Col xs={24} md={24} style={{ marginTop: '24px' }}>
                                                        <Card className="premium-card" title="Análisis Dimensional" style={{ height: 'max-content' }} bodyStyle={{ padding: '24px' }}>
                                                            <Row gutter={24} align="top">
                                                                <Col span={24}>
                                                                    <Space direction="vertical" style={{ width: '100%' }}>
                                                                        <div>
                                                                            <Text strong>Skill (Habilidad)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.skill} onChange={(v) => handleAxiParamChange('skill', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.skill} onChange={(v) => handleAxiParamChange('skill', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                        <div>
                                                                            <Text strong>Risk (Riesgo)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.risk} onChange={(v) => handleAxiParamChange('risk', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.risk} onChange={(v) => handleAxiParamChange('risk', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                        <div>
                                                                            <Text strong>Consistency (Consistencia)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.consistency} onChange={(v) => handleAxiParamChange('consistency', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.consistency} onChange={(v) => handleAxiParamChange('consistency', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                        <div>
                                                                            <Text strong>Experience (Experiencia)</Text>
                                                                            <Row gutter={16} align="middle">
                                                                                <Col span={20}>
                                                                                    <Slider min={0} max={100} value={axiParams.experience} onChange={(v) => handleAxiParamChange('experience', v)} trackStyle={{ backgroundColor: '#00b96b' }} handleStyle={{ borderColor: '#00b96b' }} style={{ margin: '14px 0' }} />
                                                                                </Col>
                                                                                <Col span={4}>
                                                                                    <InputNumber min={0} max={100} value={axiParams.experience} onChange={(v) => handleAxiParamChange('experience', v)} style={{ width: '100%' }} />
                                                                                </Col>
                                                                            </Row>
                                                                        </div>
                                                                    </Space>
                                                                </Col>
                                                            </Row>
                                                        </Card>
                                                    </Col>
                                                    <Col xs={24} md={16} lg={12} xl={8} style={{ marginTop: '24px' }}>
                                                        <Card className="premium-card" title="Rendimiento" style={{ width: '100%' }} bodyStyle={{ padding: '24px' }}>
                                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                                                                <Text type="secondary">Rentabilidad mensual comparativa.</Text>
                                                                <Button
                                                                    type="dashed"
                                                                    size="small"
                                                                    icon={<PlusOutlined />}
                                                                    onClick={() => {
                                                                        console.log('Abriendo modal mes...');
                                                                        setIsMonthlyModalVisible(true);
                                                                    }}
                                                                    style={{ borderColor: '#00b96b', color: '#00b96b', zIndex: 10, cursor: 'pointer' }}
                                                                >
                                                                    Añadir Mes
                                                                </Button>
                                                            </div>

                                                            <div style={{ width: '100%', height: 260, marginBottom: 24 }}>
                                                                <ResponsiveContainer width="100%" height="100%">
                                                                    <BarChart data={monthlyProfitability} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e8ecef" />
                                                                        <XAxis dataKey="month" tick={{ fill: '#6c757d', fontSize: 12 }} axisLine={false} tickLine={false} />
                                                                        <YAxis tick={{ fill: '#6c757d', fontSize: 12 }} axisLine={false} tickLine={false} tickFormatter={(val) => `${val}%`} />
                                                                        <RechartsTooltip
                                                                            contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}
                                                                            formatter={(value) => [`${value}%`, 'Rendimiento']}
                                                                        />
                                                                        <Bar dataKey="percentage" radius={[4, 4, 0, 0]}>
                                                                            {monthlyProfitability.map((entry, index) => (
                                                                                <Cell key={`cell-${index}`} fill={entry.percentage > 0 ? '#00b96b' : (entry.percentage < 0 ? '#ff4d4f' : '#ced4da')} />
                                                                            ))}
                                                                        </Bar>
                                                                    </BarChart>
                                                                </ResponsiveContainer>
                                                            </div>

                                                            <Table
                                                                dataSource={monthlyProfitability}
                                                                rowKey="id"
                                                                size="small"
                                                                columns={[
                                                                    { title: 'Mes', dataIndex: 'month', key: 'month' },
                                                                    {
                                                                        title: 'Rendimiento (%)',
                                                                        dataIndex: 'percentage',
                                                                        key: 'percentage',
                                                                        render: val => <span style={{ color: val > 0 ? '#00b96b' : (val < 0 ? '#ff4d4f' : '#1a1d20'), fontWeight: 'bold' }}>{val > 0 ? '+' : ''}{val}%</span>
                                                                    },
                                                                    {
                                                                        title: 'Monto ($)',
                                                                        dataIndex: 'amount',
                                                                        key: 'amount',
                                                                        render: val => <span style={{ color: val > 0 ? '#00b96b' : (val < 0 ? '#ff4d4f' : '#1a1d20') }}>${val.toLocaleString()}</span>
                                                                    }
                                                                ]}
                                                                pagination={false}
                                                            />
                                                        </Card>
                                                    </Col>


                                                </Row>
                                            </>
                                        )}

                                        {activeMenu === 'axi_real' && (
                                            <>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <div>
                                                        <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Axi Real Dashboard</Title>
                                                        <Text type="secondary">Monitoreo de capital y performance histórica.</Text>
                                                    </div>
                                                    <RangePicker size="large" />
                                                </div>

                                                <Row gutter={24} style={{ marginBottom: 24 }}>
                                                    <Col xs={24} sm={12}>
                                                        <Card className="premium-card" style={{ borderLeft: '4px solid #1677ff' }}>
                                                            <Statistic
                                                                title="Balance Actual"
                                                                value={axiRealData.balance}
                                                                precision={2}
                                                                prefix="$"
                                                                valueStyle={{ color: '#1a1d20', fontWeight: 600 }}
                                                            />
                                                        </Card>
                                                    </Col>
                                                    <Col xs={24} sm={12}>
                                                        <Card className="premium-card" style={{ borderLeft: '4px solid #00b96b' }}>
                                                            <Statistic
                                                                title="Equidad (Equity)"
                                                                value={axiRealData.equity}
                                                                precision={2}
                                                                prefix="$"
                                                                valueStyle={{ color: '#00b96b', fontWeight: 600 }}
                                                            />
                                                        </Card>
                                                    </Col>
                                                </Row>

                                                <Card className="premium-card" title="Historial de Transacciones" bodyStyle={{ padding: 0 }}>
                                                    <Table
                                                        dataSource={axiRealData.history}
                                                        columns={[
                                                            { title: 'Fecha', dataIndex: 'date', key: 'date' },
                                                            { title: 'Balance', dataIndex: 'balance', key: 'balance', render: val => `$${val.toFixed(2)}` },
                                                            { title: 'Equidad', dataIndex: 'equity', key: 'equity', render: val => `$${val.toFixed(2)}` },
                                                            { title: 'PnL', dataIndex: 'pnl', key: 'pnl', render: val => <Tag color={val >= 0 ? 'success' : 'error'}>{val >= 0 ? '+' : ''}{val.toFixed(2)}</Tag> }
                                                        ]}
                                                        pagination={false}
                                                    />
                                                </Card>
                                            </>
                                        )}

                                        {activeMenu === 'prop_trading' && (
                                            <>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Gestión de Cuentas Prop Trading</Title>
                                                    <Button type="primary" icon={<PlusOutlined />} style={{ background: '#00b96b', borderColor: '#00b96b' }} onClick={() => setIsPropModalVisible(true)}>
                                                        Nueva Cuenta
                                                    </Button>
                                                </div>

                                                {['Fase 1', 'Fase 2', 'Real'].map(fase => {
                                                    const filteredData = propTradingData.filter(d => d.type === fase);
                                                    if (filteredData.length === 0) return null;

                                                    return (
                                                        <div key={fase} style={{ marginBottom: 24 }}>
                                                            <Title level={5} style={{ color: '#1a1d20', marginBottom: 16 }}>
                                                                {fase === 'Real' ? 'Real' : `Evaluación ${fase}`}
                                                            </Title>
                                                            <Card className="premium-card" bodyStyle={{ padding: 0 }}>
                                                                <Table
                                                                    dataSource={filteredData}
                                                                    rowKey="id"
                                                                    columns={[
                                                                        { title: 'Compañía', dataIndex: 'firm', key: 'firm' },
                                                                        { title: 'Nombre de Cuenta', dataIndex: 'name', key: 'name', render: t => <Text strong>{t}</Text> },
                                                                        { title: 'Balance', dataIndex: 'balance', key: 'balance', render: val => `$${val.toLocaleString()}` },
                                                                        {
                                                                            title: 'PNL Diario',
                                                                            dataIndex: 'pnlDiario',
                                                                            key: 'pnlDiario',
                                                                            render: val => <Text style={{ color: (val || 0) >= 0 ? '#00b96b' : '#ff4d4f' }}>{(val || 0) >= 0 ? '+' : ''}{(val || 0).toLocaleString()}</Text>
                                                                        },
                                                                        {
                                                                            title: 'Balance New',
                                                                            key: 'balanceNew',
                                                                            render: (_, record) => <Text strong style={{ color: '#00b96b' }}>${(record.balance + (record.pnlDiario || 0)).toLocaleString()}</Text>
                                                                        },
                                                                        {
                                                                            title: 'Progreso',
                                                                            key: 'progress',
                                                                            width: '25%',
                                                                            render: (_, record) => {
                                                                                const balanceNew = record.balance + (record.pnlDiario || 0);
                                                                                const percent = getProgressPercent(balanceNew, record.balance, record.goal);
                                                                                return (
                                                                                    <Progress
                                                                                        percent={Math.max(0, Math.min(percent, 100))}
                                                                                        strokeColor={percent < 0 ? '#ff4d4f' : getProgressColor(percent)}
                                                                                        trailColor="#e8ecef"
                                                                                        format={() => <span style={{ color: percent < 0 ? '#ff4d4f' : 'inherit' }}>{percent}%</span>}
                                                                                    />
                                                                                );
                                                                            }
                                                                        },
                                                                        {
                                                                            title: 'Acciones',
                                                                            key: 'actions',
                                                                            render: (_, record) => (
                                                                                <Space>
                                                                                    <Button type="text" icon={<EditOutlined style={{ color: '#6c757d' }} />} />
                                                                                    <Button type="text" danger icon={<DeleteOutlined />} onClick={() => handleDeleteProp(record.id)} />
                                                                                </Space>
                                                                            )
                                                                        }
                                                                    ]}
                                                                    pagination={false}
                                                                />
                                                            </Card>
                                                        </div>
                                                    );
                                                })}
                                            </>
                                        )}

                                        {activeMenu === 'accounting' && (
                                            <Card className="premium-card" bodyStyle={{ padding: 0 }}>

                                                    dataSource={transactions}
                                                    rowKey="id"
                                                    columns={[
                                                        { title: 'Fecha', dataIndex: 'date', key: 'date' },
                                                        {
                                                            title: 'Tipo',
                                                            dataIndex: 'type',
                                                            key: 'type',
                                                            render: text => <Tag color={text === 'INCOME' ? 'green' : 'red'}>{text === 'INCOME' ? 'Ingreso' : 'Egreso'}</Tag>
                                                        },
                                                        { title: 'Categoría', dataIndex: 'category', key: 'category' },
                                                        { title: 'Descripción', dataIndex: 'description', key: 'description' },
                                                        {
                                                            title: 'Monto',
                                                            key: 'amount',
                                                            render: (_, record) => (
                                                                <span style={{ color: record.type === 'INCOME' ? '#00b96b' : '#ff4d4f', fontWeight: 'bold' }}>
                                                                    {record.type === 'INCOME' ? '+' : '-'}${Number(record.amount).toLocaleString()}
                                                                </span>
                                                            )
                                                        }
                                                    ]}
                                                    pagination={{ pageSize: 10 }}
                                                />
                                            </Card>
                                        )}

                                        {activeMenu === 'users_settings' && (
                                            <>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                                                    <Title level={4} style={{ color: '#1a1d20', margin: 0 }}>Gestión de Usuarios</Title>
                                                    <Button type="primary" icon={<PlusOutlined />} style={{ background: '#00b96b', borderColor: '#00b96b' }} onClick={() => setIsUserModalVisible(true)} disabled={currentUser?.role !== 'admin'}>
                                                        Nuevo Usuario
                                                    </Button>
                                                </div>
                                                {currentUser?.role !== 'admin' && (
                                                    <div style={{ marginBottom: 16 }}>
                                                        <Text type="danger">Acceso denegado: Se requieren permisos de administrador para gestionar usuarios.</Text>
                                                    </div>
                                                )}
                                                <Card className="premium-card" bodyStyle={{ padding: 0 }}>
                                                    <Table
                                                        dataSource={users}
                                                        rowKey="id"
                                                        columns={[
                                                            { title: 'ID', dataIndex: 'id', key: 'id' },
                                                            { title: 'Usuario', dataIndex: 'username', key: 'username', render: t => <Text strong>{t}</Text> },
                                                            { title: 'Rol', dataIndex: 'role', key: 'role', render: t => <Tag color={t === 'admin' ? 'purple' : 'blue'}>{t.toUpperCase()}</Tag> },
                                                            {
                                                                title: 'Acciones',
                                                                key: 'actions',
                                                                render: (_, record) => (
                                                                    <Button type="text" danger icon={<DeleteOutlined />} onClick={() => handleDeleteUser(record.id)} disabled={record.role === 'admin' || currentUser?.role !== 'admin'} />
                                                                )
                                                            }
                                                        ]}
                                                        pagination={false}
                                                    />
                                                </Card>
                                            </>
                                        )}

                                    </Content>
                                </Layout>
                            </Layout>

                                        <Select>
                                            <Select.Option value="INCOME">Ingreso</Select.Option>
                                            <Select.Option value="EXPENSE">Egreso</Select.Option>
                                        </Select>
                                    </Form.Item>
                                    <Form.Item name="category" label="Categoría" rules={[{ required: true }]}>
                                        <Select>
                                            <Select.Option value="Axi Select">Axi Select</Select.Option>
                                            <Select.Option value="Retiro Socios">Retiro Socios</Select.Option>
                                            <Select.Option value="Otros">Otros</Select.Option>
                                        </Select>
                                    </Form.Item>
                                    <Form.Item name="amount" label="Monto" rules={[{ required: true }]}>
                                        <InputNumber min={0} step={0.01} style={{ width: '100%' }} prefix="$" />
                                    </Form.Item>
                                    <Form.Item name="description" label="Descripción">
                                        <Input />
                                    </Form.Item>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Guardar</Button>
                                </Form>
                            </Modal>

                                <Form form={userForm} layout="vertical" onFinish={handleUserSubmit}>

                                        <Input prefix={<UserOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} />
                                    </Form.Item>
                                    <Form.Item name="password" label="Contraseña" rules={[{ required: true }]}>
                                        <Input.Password prefix={<LockOutlined style={{ color: 'rgba(0,0,0,.25)' }} />} />
                                    </Form.Item>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Guardar Usuario</Button>
                                </Form>
                            </Modal>

                            {/* Modal for Montly Profitability */}
                            <Modal title="Añadir Mes de Rendimiento" open={isMonthlyModalVisible} onCancel={() => setIsMonthlyModalVisible(false)} footer={null}>
                                <Form form={monthlyForm} layout="vertical" onFinish={handleAddMonthlyRecord}>
                                    <Form.Item name="month" label="Mes y Año (Ej: Marzo 2026)" rules={[{ required: true }]}>
                                        <Input placeholder="Ej. Marzo 2026" />
                                    </Form.Item>
                                    <Row gutter={16}>
                                        <Col span={12}>
                                            <Form.Item name="percentage" label="Rentabilidad (%)" rules={[{ required: true }]}>
                                                <InputNumber style={{ width: '100%' }} step={0.1} placeholder="Ej. 2.5" />
                                            </Form.Item>
                                        </Col>
                                        <Col span={12}>
                                            <Form.Item name="amount" label="Monto (USD)" rules={[{ required: true }]}>
                                                <InputNumber min={0} style={{ width: '100%' }} prefix="$" placeholder="Ej. 1250" />
                                            </Form.Item>
                                        </Col>
                                    </Row>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Guardar Mes</Button>
                                </Form>
                            </Modal>

                            {/* Modal for Prop Trading */}
                            <Modal title="Nueva Cuenta Prop Trading" open={isPropModalVisible} onCancel={() => setIsPropModalVisible(false)} footer={null}>
                                <Form form={propForm} layout="vertical" onFinish={handlePropSubmit}>
                                    <Form.Item name="firm" label="Compañía" rules={[{ required: true }]}>
                                        <Input placeholder="Ej. Tradeify, Topstep..." />
                                    </Form.Item>
                                    <Form.Item name="name" label="Nombre de Cuenta" rules={[{ required: true }]}>
                                        <Input placeholder="Ej. PA #1" />
                                    </Form.Item>
                                    <Form.Item name="type" label="Tipo de Cuenta" rules={[{ required: true }]} initialValue="Fase 1">
                                        <Select>
                                            <Select.Option value="Fase 1">Fase 1</Select.Option>
                                            <Select.Option value="Fase 2">Fase 2</Select.Option>
                                            <Select.Option value="Real">Real</Select.Option>
                                        </Select>
                                    </Form.Item>
                                    <Row gutter={16}>
                                        <Col span={8}>
                                            <Form.Item name="balance" label="Balance Inicial" rules={[{ required: true }]}>
                                                <InputNumber min={0} style={{ width: '100%' }} prefix="$" />
                                            </Form.Item>
                                        </Col>
                                        <Col span={8}>
                                            <Form.Item name="pnlDiario" label="PNL Diario" initialValue={0}>
                                                <InputNumber style={{ width: '100%' }} prefix="$" />
                                            </Form.Item>
                                        </Col>
                                        <Col span={8}>
                                            <Form.Item name="goal" label="Meta / Retiro (Ganancia a alcanzar)" rules={[{ required: true }]}>
                                                <InputNumber style={{ width: '100%' }} prefix="$" placeholder="Ej. 1000" />
                                            </Form.Item>
                                        </Col>
                                    </Row>
                                    <Button type="primary" htmlType="submit" block style={{ background: '#00b96b', borderColor: '#00b96b' }}>Guardar Cuenta</Button>
                                </Form>
                            </Modal>
                        </>
                    </ConfigProvider >
                );
            };

            const rootNode = document.getElementById('root');
            if (window.ReactDOM && window.ReactDOM.createRoot) {
                const root = window.ReactDOM.createRoot(rootNode);
                root.render(<App />);
            } else if (window.ReactDOM) {
                window.ReactDOM.render(<App />, rootNode);
            } else {
                console.error("ReactDOM not found.");
                rootNode.innerHTML = "<h1>Error: ReactDOM not found</h1>";
            }
        } catch (err) {
            console.error(err);
            document.getElementById('root').innerHTML = "<h1>Error en el renderizado</h1><pre>" + err.message + "</pre>";
        }
    </script>
</body>

</html>
